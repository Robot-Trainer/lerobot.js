name: Release & Deploy - Github Only

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Dependencies
        # Changed to --frozen-lockfile for deterministic, safe release builds
        run: pnpm install --frozen-lockfile --recursive

      - name: Build Packages
        run: pnpm run build:all

      - name: Publish to GitHub Packages
        # This publishes the actual packages so users can pnpm install them
        run: pnpm -r publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Zip packages
        # Keeping your custom artifact zipping for users who want raw downloads
        run: |
          cd packages
          zip -r ../cli-dist.zip cli/dist cli/package.json
          zip -r ../node-dist.zip node/dist node/package.json
          zip -r ../web-dist.zip web/dist web/package.json
          cd ..
          zip -r release-all.zip packages/cli/dist packages/cli/package.json packages/node/dist packages/node/package.json packages/web/dist packages/web/package.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cli-dist.zip
            node-dist.zip
            web-dist.zip
            release-all.zip
          draft: false
          prerelease: false
          generate_release_notes: true # Auto-generates notes based on PRs since last tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}